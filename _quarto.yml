project:
  type: website
  output-dir: dist
  render:
    - "*.qmd"
    - "*.ipynb"
    - "!LICENSE.md"
format:
  html:
    ipynb-filters: 
      - filters/preprocess_notebook.py
    theme:
      light: [flatly, theme/site.scss]
      dark: [darkly, theme/site.scss]
execute:
  freeze: true
